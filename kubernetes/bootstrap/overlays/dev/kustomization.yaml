apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# ═══════════════════════════════════════════════════════
# DEV Environment Bootstrap
# ═══════════════════════════════════════════════════════

resources:
  - ../../base

namespace: dev

commonLabels:
  diksha.dev/environment: dev

patches:
  # Dev gets smaller quotas
  - target:
      kind: ResourceQuota
      name: app-quota
    patch: |
      - op: replace
        path: /spec/hard/requests.cpu
        value: "4"
      - op: replace
        path: /spec/hard/requests.memory
        value: "8Gi"
      - op: replace
        path: /spec/hard/limits.cpu
        value: "8"
      - op: replace
        path: /spec/hard/limits.memory
        value: "16Gi"
      - op: replace
        path: /spec/hard/pods
        value: "30"
