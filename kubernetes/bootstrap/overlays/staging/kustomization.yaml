apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# ═══════════════════════════════════════════════════════
# STAGING Environment Bootstrap
# ═══════════════════════════════════════════════════════

resources:
  - ../../base

namespace: staging

commonLabels:
  diksha.dev/environment: staging

patches:
  - target:
      kind: ResourceQuota
      name: app-quota
    patch: |
      - op: replace
        path: /spec/hard/requests.cpu
        value: "6"
      - op: replace
        path: /spec/hard/requests.memory
        value: "12Gi"
      - op: replace
        path: /spec/hard/limits.cpu
        value: "12"
      - op: replace
        path: /spec/hard/limits.memory
        value: "24Gi"
      - op: replace
        path: /spec/hard/pods
        value: "40"
