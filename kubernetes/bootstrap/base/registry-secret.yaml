# OCIR Registry Pull Secret — used by Helm imagePullSecrets
# Replace the .dockerconfigjson value with your real base64-encoded Docker config JSON:
#   echo '{"auths":{"bom.ocir.io":{"username":"<tenancy>/<user>","password":"<auth-token>"}}}' | base64 -w0
# Patch per-env with Kustomize overlays or sealed-secrets.
apiVersion: v1
kind: Secret
metadata:
  name: ocir-registry
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: REPLACE_WITH_BASE64_ENCODED_DOCKER_CONFIG_JSON
