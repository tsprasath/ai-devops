{{- if .Values.vault.enabled }}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "auth-service.fullname" . }}-vault
  labels:
    {{- include "auth-service.labels" . | nindent 4 }}
spec:
  provider: vault
  parameters:
    vaultAddress: {{ .Values.vault.address | quote }}
    roleName: {{ .Values.vault.role | quote }}
    objects: |
      {{- range .Values.vault.secrets }}
      - objectName: {{ .key | quote }}
        secretPath: {{ $.Values.vault.secretPath | quote }}
        secretKey: {{ .key | quote }}
      {{- end }}
  secretObjects:
    - secretName: {{ include "auth-service.fullname" . }}-vault-secrets
      type: Opaque
      data:
        {{- range .Values.vault.secrets }}
        - objectName: {{ .key | quote }}
          key: {{ .envVar | default .key | quote }}
        {{- end }}
{{- end }}
