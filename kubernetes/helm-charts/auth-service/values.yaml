# ═══════════════════════════════════════════════════════
# auth-service — Base Helm Values (shared defaults)
# ═══════════════════════════════════════════════════════
# Per-env overrides: values-dev.yaml, values-staging.yaml, values-prod.yaml
# Jenkins CI updates image.tag in the environment-specific file.
# ArgoCD merges base + env values at deploy time.

replicaCount: 2

image:
  repository: bom.ocir.io/diksha/diksha-dev/auth-service
  tag: latest    # ← Jenkins CI overwrites this in values-{env}.yaml
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: ocir-registry

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: false

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

probes:
  liveness:
    path: /health
    port: 3000
    initialDelaySeconds: 15
    periodSeconds: 10
  readiness:
    path: /ready
    port: 3000
    initialDelaySeconds: 5
    periodSeconds: 5
  startup:
    path: /health
    port: 3000
    failureThreshold: 30
    periodSeconds: 2

pdb:
  enabled: true
  minAvailable: 1

# ── ConfigMap values (non-secret app configuration) ──
# All these become env vars via envFrom configMapRef
config:
  NODE_ENV: production
  LOG_LEVEL: info
  PORT: "3000"
  SERVICE_NAME: auth-service

# ── Vault Integration (secrets injected at runtime via CSI driver) ──
# Requires: secrets-store-csi-driver + vault-csi-provider installed on cluster
vault:
  enabled: true
  address: "http://vault.vault.svc.cluster.local:8200"
  role: "auth-service"
  secretPath: "secret/data/diksha/auth-service"
  secrets:
    - key: JWT_SECRET
    - key: DB_PASSWORD
      envVar: DATABASE_PASSWORD
    - key: REDIS_PASSWORD

env: {}

secrets: []

serviceAccount:
  create: true
  name: ""

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

containerSecurityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false

podAnnotations:
  reloader.stakater.com/auto: "true"

networkPolicy:
  enabled: true
