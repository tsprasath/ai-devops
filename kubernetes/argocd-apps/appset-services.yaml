# ═══════════════════════════════════════════════════════
# ArgoCD ApplicationSet — Auto-discovers Helm charts
# ═══════════════════════════════════════════════════════
# For each directory under kubernetes/helm-charts/ that has a Chart.yaml,
# AND for each environment (dev/staging/prod), create an ArgoCD Application.
#
# When you add a new service:
#   1. Create kubernetes/helm-charts/<service-name>/Chart.yaml + values*.yaml
#   2. ArgoCD auto-creates the Application — no manual YAML needed
#
# This replaces the per-service per-env YAML files in argocd-apps/{env}/.

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: diksha-services
  namespace: argocd
spec:
  generators:
    - matrix:
        generators:
          # Generator 1: environments with auto-sync enabled
          - list:
              elements:
                - env: dev
                  namespace: dev
                - env: staging
                  namespace: staging
          # Generator 2: auto-discover services from repo directory structure
          - git:
              repoURL: https://github.com/tsprasath/ai-devops.git
              revision: main
              directories:
                - path: kubernetes/helm-charts/*
  template:
    metadata:
      name: "{{path.basename}}-{{env}}"
      namespace: argocd
      labels:
        app.kubernetes.io/name: "{{path.basename}}"
        app.kubernetes.io/part-of: diksha-dev
        diksha.dev/environment: "{{env}}"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      source:
        repoURL: https://github.com/tsprasath/ai-devops.git
        targetRevision: main
        path: "{{path}}"
        helm:
          valueFiles:
            - values.yaml
            - "values-{{env}}.yaml"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{namespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=false
          - PrunePropagationPolicy=foreground
          - ServerSideApply=true
        retry:
          limit: 3
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
---
# Prod services — manual sync only
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: diksha-services-prod
  namespace: argocd
spec:
  generators:
    - matrix:
        generators:
          - list:
              elements:
                - env: prod
                  namespace: prod
          - git:
              repoURL: https://github.com/tsprasath/ai-devops.git
              revision: main
              directories:
                - path: kubernetes/helm-charts/*
  template:
    metadata:
      name: "{{path.basename}}-{{env}}"
      namespace: argocd
      labels:
        app.kubernetes.io/name: "{{path.basename}}"
        app.kubernetes.io/part-of: diksha-dev
        diksha.dev/environment: "{{env}}"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      source:
        repoURL: https://github.com/tsprasath/ai-devops.git
        targetRevision: main
        path: "{{path}}"
        helm:
          valueFiles:
            - values.yaml
            - "values-{{env}}.yaml"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{namespace}}"
      syncPolicy:
        syncOptions:
          - CreateNamespace=false
          - PrunePropagationPolicy=foreground
          - ServerSideApply=true
        retry:
          limit: 3
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
