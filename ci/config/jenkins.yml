# ═══════════════════════════════════════════════════════════════════
# Jenkins Configuration as Code (JCasC) — AI DevOps Platform
# ═══════════════════════════════════════════════════════════════════
# Mount at: /var/jenkins_home/casc_configs/jenkins.yml
# Or set:   CASC_JENKINS_CONFIG=/var/jenkins_home/casc_configs/jenkins.yml
#
# Non-secret values are hardcoded below. Only true secrets use ${VAR}
# interpolation — supply them via env vars or a .env file loaded by Jenkins.
# Required secrets: JENKINS_ADMIN_PASSWORD, OCIR_USERNAME, OCIR_PASSWORD,
#   GIT_TOKEN, SLACK_WEBHOOK_URL, TEAMS_WEBHOOK_URL, SONAR_TOKEN
# See: ci/config/env.example for the secret variable list.
# ═══════════════════════════════════════════════════════════════════

# ─── Jenkins Core ─────────────────────────────────────────────────
jenkins:
  systemMessage: >-
    AI DevOps Platform — Jenkins CI + ArgoCD GitOps.
    Managed by JCasC (ci/config/jenkins.yml). Do not configure manually.

  # numExecutors: 0  # Uncomment when using K8s pod agents only

  # ── Security Realm ──────────────────────────────────────────────
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "${JENKINS_ADMIN_USER:-admin}"
          password: "${JENKINS_ADMIN_PASSWORD}"

  authorizationStrategy:
    globalMatrix:
      permissions:
        - "Overall/Administer:${JENKINS_ADMIN_USER:-admin}"
        - "Overall/Read:authenticated"
        - "Job/Build:authenticated"
        - "Job/Read:authenticated"
        - "Job/Workspace:authenticated"

  # ── Global Environment Variables ────────────────────────────────
  # Available as env.VAR_NAME in every pipeline and shared library.
  # These replace the hardcoded Constants.groovy values.
  globalNodeProperties:
    - envVars:
        env:
          # ── OCI / Registry ──
          - key: OCI_REGION
            value: "ap-mumbai-1"
          - key: OCIR_URL
            value: "bom.ocir.io"
          - key: OCIR_NAMESPACE
            value: "diksha"
          - key: PROJECT_NAME
            value: "diksha-dev"
          # ── GitOps (this devops repo — where Helm values live) ──
          - key: GITOPS_REPO
            value: "https://github.com/tsprasath/ai-devops.git"
          - key: GITOPS_BRANCH
            value: "main"
          # ── App Repos (source code repos) ──
          - key: AUTH_SERVICE_REPO
            value: "https://github.com/tsprasath/sample-test-app.git"
          # ── Notifications ──
          - key: SLACK_CHANNEL
            value: "#ci-cd-notifications"
          - key: SLACK_CHANNEL_ALERTS
            value: "#ci-cd-alerts"
          # ── Trivy defaults ──
          - key: TRIVY_SEVERITY
            value: "CRITICAL,HIGH"
          - key: TRIVY_HIGH_THRESHOLD
            value: "5"
          # ── Kubeconfig ──
          - key: KUBECONFIG
            value: "/var/lib/jenkins/secrets/kubeconfig"

  # ── Kubernetes Cloud (OKE pod agents) ───────────────────────────
  # Uncomment when deploying to OKE cluster with pod-based agents.
  # clouds:
  #   - kubernetes:
  #       name: "oke"
  #       serverUrl: "${OKE_API_SERVER}"
  #       namespace: "${JENKINS_AGENT_NAMESPACE:-jenkins}"
  #       jenkinsUrl: "${JENKINS_URL:-http://jenkins.jenkins.svc.cluster.local:8080}"
  #       jenkinsTunnel: "${JENKINS_TUNNEL:-jenkins-agent.jenkins.svc.cluster.local:50000}"
  #       credentialsId: "oke-kubeconfig"
  #       podLabels:
  #         - key: "jenkins"
  #           value: "agent"
  #       templates:
  #         - name: "build-pod"
  #           label: "build-agent docker"
  #           yaml: |
  #             apiVersion: v1
  #             kind: Pod
  #             spec:
  #               containers:
  #                 - name: docker
  #                   image: docker:24-dind
  #                   securityContext:
  #                     privileged: true
  #                 - name: jnlp
  #                   image: jenkins/inbound-agent:latest
  #           serviceAccount: "${JENKINS_SA:-jenkins-agent}"
  #           idleMinutes: 5

  numExecutors: 2  # Local: use built-in executors

# ─── Tools ────────────────────────────────────────────────────────
tool:
  git:
    installations:
      - name: "Default"
        home: "/usr/bin/git"
  nodejs:
    installations:
      - name: "NodeJS-20"
        home: ""
        properties:
          - installSource:
              installers:
                - nodeJSInstaller:
                    id: "20.11.0"

# ─── Global Libraries ────────────────────────────────────────────
unclassified:
  globalLibraries:
    libraries:
      - name: "diksha-dev-lib"
        defaultVersion: "shared-lib"
        implicit: false
        allowVersionOverride: true
        retriever:
          modernSCM:
            scm:
              gitSource:
                remote: "https://github.com/tsprasath/ai-devops.git"
                credentialsId: "git-credentials"

  scmGit:
    globalConfigName: "Jenkins CI"
    globalConfigEmail: "jenkins@diksha.dev"

# ─── Jobs ─────────────────────────────────────────────────────────
# Split-repo pattern: one parameterized pipeline per service.
# App repos trigger these via webhook → Jenkinsfile.app-repo template.
# To add a new service, copy the auth-service block and change the defaults.
jobs:
  # ── Service Build: auth-service ────────────────────────────────
  # Triggered by app repo webhook OR manually with parameters.
  - script: >
      pipelineJob('service-build-auth-service') {
        description('Build auth-service from app repo, push to OCIR, update GitOps values')
        parameters {
          stringParam('APP_REPO_URL', 'https://github.com/tsprasath/sample-test-app.git', 'App source repo URL')
          stringParam('APP_REPO_BRANCH', 'main', 'Branch to build')
          stringParam('SERVICE_NAME', 'auth-service', 'Service name (matches Helm chart dir)')
          stringParam('SERVICE_DIR', '.', 'Path to Dockerfile in app repo')
        }
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('https://github.com/tsprasath/ai-devops.git')
                  credentials('git-credentials')
                }
                branch('*/main')
              }
            }
            scriptPath('ci/Jenkinsfile')
          }
        }
        properties {
          disableConcurrentBuilds()
        }
        logRotator {
          numToKeep(20)
        }
      }

  # ── PR Validation (runs from app repos, test-only, no deploy) ──
  - script: >
      multibranchPipelineJob('ai-devops-pr') {
        description('PR validation — lint, test, scan (no push, no deploy)')
        branchSources {
          branchSource {
            source {
              git {
                id('ai-devops-pr')
                remote('https://github.com/tsprasath/ai-devops.git')
                credentialsId('git-credentials')
              }
            }
          }
        }
        factory {
          workflowBranchProjectFactory {
            scriptPath('ci/Jenkinsfile.pr')
          }
        }
        orphanedItemStrategy {
          discardOldItems {
            numToKeep(10)
          }
        }
      }

  # ── Local Dev Pipeline ─────────────────────────────────────────
  - script: >
      pipelineJob('ai-devops-local') {
        description('Local/WSL dev pipeline — no K8s, no shared lib')
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('https://github.com/tsprasath/ai-devops.git')
                  credentials('git-credentials')
                }
                branch('*/main')
              }
            }
            scriptPath('ci/Jenkinsfile.local')
          }
        }
        properties {
          disableConcurrentBuilds()
        }
        logRotator {
          numToKeep(10)
        }
      }

# ─── Credentials ─────────────────────────────────────────────────
# All secrets injected from environment variables. NEVER commit real values.
credentials:
  system:
    domainCredentials:
      - credentials:
          # ── OCIR (Oracle Cloud Container Registry) ──────────────
          - usernamePassword:
              scope: GLOBAL
              id: "ocir-credentials"
              username: "${OCIR_USERNAME}"
              password: "${OCIR_PASSWORD}"
              description: "OCI Container Registry"

          # ── GitHub token (for gitops updates + PR status) ───────
          - usernamePassword:
              scope: GLOBAL
              id: "git-credentials"
              username: "${GIT_USERNAME:-jenkins}"
              password: "${GIT_TOKEN}"
              description: "GitHub PAT for repo access and gitops updates"

          # ── Slack Webhook ───────────────────────────────────────
          - string:
              scope: GLOBAL
              id: "slack-webhook-url"
              secret: "${SLACK_WEBHOOK_URL}"
              description: "Slack incoming webhook"

          # ── Teams Webhook ───────────────────────────────────────
          - string:
              scope: GLOBAL
              id: "teams-webhook-url"
              secret: "${TEAMS_WEBHOOK_URL}"
              description: "Microsoft Teams incoming webhook"

          # ── SonarQube Token (optional) ──────────────────────────
          - string:
              scope: GLOBAL
              id: "sonar-token"
              secret: "${SONAR_TOKEN}"
              description: "SonarQube analysis token"
